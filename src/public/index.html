<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♟️ ИМБОВЫЕ ШАХМАТЫ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        #main-menu {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        
        #game-area {
            background: #2d2d44;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        #chessboard {
            width: 100%;
            aspect-ratio: 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background: #1a1a2e;
            padding: 10px;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(5vw, 45px);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .square.light {
            background: var(--light-color);
        }
        
        .square.dark {
            background: var(--dark-color);
        }
        
        .square.selected {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
            z-index: 10;
        }
        
        .square.possible-move {
            position: relative;
        }
        
        .square.possible-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(0,255,0,0.5);
            border-radius: 50%;
        }
        
        .square:active {
            transform: scale(0.95);
        }
        
        #sidebar {
            background: #2d2d44;
            border-radius: 30px;
            padding: 20px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .player-card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #4a4a6a;
        }
        
        .player-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .player-rating {
            font-size: 18px;
            color: #7fffd4;
            margin: 5px 0;
        }
        
        .player-color {
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .white-color { background: #f0f0f0; color: black; }
        .black-color { background: #333; color: white; }
        
        .menu-section {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 15px;
        }
        
        .menu-title {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .skin-option {
            background: #2d2d44;
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .skin-option:hover {
            border-color: #ffd700;
            transform: scale(1.05);
        }
        
        .skin-option.selected {
            border-color: #7fffd4;
            box-shadow: 0 0 20px #7fffd4;
        }
        
        .skin-preview {
            width: 100%;
            height: 40px;
            border-radius: 5px;
            margin-bottom: 5px;
            display: flex;
        }
        
        .skin-light {
            flex: 1;
            border-radius: 5px 0 0 5px;
        }
        
        .skin-dark {
            flex: 1;
            border-radius: 0 5px 5px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #4a4a6a, #2a2a4a);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 5px 0;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: black;
        }
        
        #room-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #4a4a6a;
            background: #1a1a2e;
            color: white;
            margin: 5px 0;
            font-size: 16px;
        }
        
        #chat-box {
            flex: 1;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .chat-message {
            padding: 5px 10px;
            background: #2d2d44;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .chat-sender {
            color: #ffd700;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .chat-time {
            color: #7fffd4;
            font-size: 10px;
            float: right;
        }
        
        #chat-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #4a4a6a;
            background: #1a1a2e;
            color: white;
        }
        
        #turn-indicator {
            font-size: 20px;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            background: #1a1a2e;
            margin: 10px 0;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #2d2d44;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            color: white;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .winner-text {
            font-size: 24px;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .rating-change {
            font-size: 20px;
            color: #7fffd4;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="main-menu">
        <div id="game-area">
            <div id="chessboard"></div>
            <div id="turn-indicator">♟️ Ожидание соперника...</div>
        </div>
        
        <div id="sidebar">
            <div class="player-card" id="player-card">
                <div class="player-name" id="player-name">Загрузка...</div>
                <div class="player-rating" id="player-rating">⭐ 1200</div>
                <div class="player-color" id="player-color-display">⚪ Белые</div>
            </div>
            
            <div class="menu-section">
                <div class="menu-title">🎮 ИГРА</div>
                <button class="btn btn-primary" id="create-room-btn">➕ СОЗДАТЬ КОМНАТУ</button>
                <input type="text" id="room-input" placeholder="🔑 Введи ID комнаты">
                <button class="btn" id="join-room-btn">🔗 ПРИСОЕДИНИТЬСЯ</button>
                <button class="btn" id="ready-btn" style="display:none;">✅ ГОТОВ</button>
                <button class="btn" id="resign-btn" style="display:none;">🏳️ СДАТЬСЯ</button>
                <button class="btn" id="draw-btn" style="display:none;">🤝 НИЧЬЯ</button>
            </div>
            
            <div class="menu-section">
                <div class="menu-title">🎨 СКИНЫ ДОСКИ</div>
                <div class="skin-grid" id="skins-container"></div>
            </div>
            
            <div class="menu-section">
                <div class="menu-title">💬 ЧАТ</div>
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Напиши сообщение...">
            </div>
            
            <div class="menu-section">
                <div class="menu-title">👥 ИГРОКИ</div>
                <div id="players-list"></div>
            </div>
        </div>
    </div>
    
    <div id="game-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">🏆</div>
            <div id="modal-content"></div>
            <button class="btn btn-primary" id="modal-close-btn">ОК</button>
        </div>
    </div>

    <script>
        const socket = new WebSocket('wss://' + window.location.host);
        
        let playerId = null;
        let playerName = 'Игрок_' + Math.floor(Math.random() * 1000);
        let playerRating = 1200;
        let playerColor = null;
        let currentRoom = null;
        
        let board = [];
        let selectedSquare = null;
        let possibleMoves = [];
        let currentTurn = 'white';
        let gameStarted = false;
        let players = [];
        let skins = {};
        let currentSkin = 'classic';
        
        // Элементы DOM
        const chessboard = document.getElementById('chessboard');
        const playerNameSpan = document.getElementById('player-name');
        const playerRatingSpan = document.getElementById('player-rating');
        const playerColorSpan = document.getElementById('player-color-display');
        const turnIndicator = document.getElementById('turn-indicator');
        const createRoomBtn = document.getElementById('create-room-btn');
        const joinRoomBtn = document.getElementById('join-room-btn');
        const readyBtn = document.getElementById('ready-btn');
        const resignBtn = document.getElementById('resign-btn');
        const drawBtn = document.getElementById('draw-btn');
        const roomInput = document.getElementById('room-input');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const playersList = document.getElementById('players-list');
        const skinsContainer = document.getElementById('skins-container');
        const modal = document.getElementById('game-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalContent = document.getElementById('modal-content');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        
        playerNameSpan.textContent = playerName;
        playerRatingSpan.textContent = `⭐ ${playerRating}`;
        
        // Сокет
        socket.onopen = () => {
            console.log('✅ Подключено к серверу');
        };
        
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
                case 'skins_list':
                    skins = {};
                    data.skins.forEach(skin => {
                        skins[skin.id] = skin;
                    });
                    renderSkins();
                    break;
                    
                case 'room_created':
                    currentRoom = data.roomId;
                    playerColor = data.color;
                    updatePlayerColor();
                    addChatMessage('Система', `✅ Комната создана! ID: ${data.roomId}`);
                    readyBtn.style.display = 'block';
                    createRoomBtn.disabled = true;
                    joinRoomBtn.disabled = true;
                    break;
                    
                case 'room_update':
                    players = data.players;
                    updatePlayersList();
                    if (players.length === 2) {
                        readyBtn.style.display = 'block';
                    }
                    break;
                    
                case 'game_start':
                    board = data.board;
                    playerColor = data.yourColor;
                    currentTurn = data.currentTurn;
                    gameStarted = true;
                    renderBoard();
                    updatePlayerColor();
                    turnIndicator.textContent = currentTurn === playerColor ? 
                        '🎯 ТВОЙ ХОД!' : '⏳ ХОД СОПЕРНИКА';
                    readyBtn.style.display = 'none';
                    resignBtn.style.display = 'block';
                    drawBtn.style.display = 'block';
                    addChatMessage('Система', '🎮 Игра началась!');
                    break;
                    
                case 'move':
                    board = data.board;
                    currentTurn = data.currentTurn;
                    renderBoard();
                    
                    if (data.lastMove) {
                        highlightLastMove(data.lastMove);
                    }
                    
                    turnIndicator.textContent = currentTurn === playerColor ? 
                        '🎯 ТВОЙ ХОД!' : '⏳ ХОД СОПЕРНИКА';
                    
                    if (data.check) {
                        addChatMessage('Система', '⚡ ШАХ!');
                    }
                    break;
                    
                case 'game_over':
                    gameStarted = false;
                    resignBtn.style.display = 'none';
                    drawBtn.style.display = 'none';
                    createRoomBtn.disabled = false;
                    joinRoomBtn.disabled = false;
                    
                    modal.classList.remove('hidden');
                    
                    if (data.reason === 'checkmate') {
                        const winner = data.winner === playerColor ? 'ТЫ' : 'СОПЕРНИК';
                        modalTitle.textContent = winner === 'ТЫ' ? '🏆 ПОБЕДА!' : '💔 ПОРАЖЕНИЕ';
                        modalContent.innerHTML = `
                            <div class="winner-text">${winner} ${data.winner === playerColor ? '🎉' : '😢'}</div>
                            <div class="rating-change">Новый рейтинг: ⭐ ${data.newRating || playerRating}</div>
                        `;
                        if (data.newRating) {
                            playerRating = data.newRating;
                            playerRatingSpan.textContent = `⭐ ${playerRating}`;
                        }
                    } else if (data.reason === 'resign') {
                        modalTitle.textContent = '🏳️ СОПЕРНИК СДАЛСЯ';
                        modalContent.innerHTML = '<div class="winner-text">ТЫ ПОБЕДИЛ! 🎉</div>';
                    } else if (data.reason === 'draw') {
                        modalTitle.textContent = '🤝 НИЧЬЯ';
                        modalContent.innerHTML = '<div class="winner-text">ДОГОВОРИЛИСЬ</div>';
                    }
                    break;
                    
                case 'opponent_left':
                    gameStarted = false;
                    resignBtn.style.display = 'none';
                    drawBtn.style.display = 'none';
                    createRoomBtn.disabled = false;
                    joinRoomBtn.disabled = false;
                    
                    modal.classList.remove('hidden');
                    modalTitle.textContent = '👋 СОПЕРНИК УШЁЛ';
                    modalContent.innerHTML = '<div class="winner-text">ТЫ ПОБЕДИЛ!</div>';
                    break;
                    
                case 'error':
                    alert(data.message);
                    break;
                    
                case 'chat':
                    addChatMessage(data.sender, data.message, data.time);
                    break;
                    
                case 'skin_applied':
                    currentSkin = data.skin;
                    renderBoard();
                    addChatMessage('Система', `🎨 Скин "${skins[data.skin].name}" применён`);
                    break;
                    
                case 'draw_offer':
                    if (confirm(`🤝 ${data.from} предлагает ничью. Согласен?`)) {
                        socket.send(JSON.stringify({ type: 'accept_draw' }));
                    }
                    break;
            }
        };
        
        function renderBoard() {
            chessboard.innerHTML = '';
            const skin = skins[currentSkin] || skins.classic;
            
            document.documentElement.style.setProperty('--light-color', skin.light);
            document.documentElement.style.setProperty('--dark-color', skin.dark);
            
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const square = document.createElement('div');
                    square.className = `square ${(x + y) % 2 === 0 ? 'light' : 'dark'}`;
                    square.dataset.x = x;
                    square.dataset.y = y;
                    
                    if (board[y] && board[y][x]) {
                        square.textContent = board[y][x];
                    }
                    
                    if (selectedSquare && selectedSquare.x === x && selectedSquare.y === y) {
                        square.classList.add('selected');
                    }
                    
                    if (possibleMoves.some(m => m.x === x && m.y === y)) {
                        square.classList.add('possible-move');
                    }
                    
                    square.onclick = () => handleSquareClick(x, y);
                    chessboard.appendChild(square);
                }
            }
        }
        
        function handleSquareClick(x, y) {
            if (!gameStarted || currentTurn !== playerColor) return;
            
            if (selectedSquare === null) {
                // Выбираем фигуру
                if (board[y] && board[y][x]) {
                    const piece = board[y][x];
                    const isMyPiece = (playerColor === 'white' && piece.charCodeAt(0) > 9812) ||
                                     (playerColor === 'black' && piece.charCodeAt(0) < 9812);
                    
                    if (isMyPiece) {
                        selectedSquare = { x, y };
                        calculatePossibleMoves(x, y);
                        renderBoard();
                    }
                }
            } else {
                // Делаем ход
                socket.send(JSON.stringify({
                    type: 'move',
                    from: selectedSquare,
                    to: { x, y }
                }));
                
                selectedSquare = null;
                possibleMoves = [];
                renderBoard();
            }
        }
        
        function calculatePossibleMoves(x, y) {
            possibleMoves = [];
            // Упрощённо - все соседние клетки
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = x + dx;
                    const ny = y + dy;
                    if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8) {
                        possibleMoves.push({ x: nx, y: ny });
                    }
                }
            }
        }
        
        function highlightLastMove(move) {
            // Можно добавить подсветку последнего хода
        }
        
        function renderSkins() {
            skinsContainer.innerHTML = '';
            Object.entries(skins).forEach(([id, skin]) => {
                const option = document.createElement('div');
                option.className = `skin-option ${id === currentSkin ? 'selected' : ''}`;
                option.innerHTML = `
                    <div class="skin-preview">
                        <div class="skin-light" style="background: ${skin.light}"></div>
                        <div class="skin-dark" style="background: ${skin.dark}"></div>
                    </div>
                    <div>${skin.name}</div>
                `;
                option.onclick = () => {
                    socket.send(JSON.stringify({
                        type: 'set_skin',
                        skin: id
                    }));
                };
                skinsContainer.appendChild(option);
            });
        }
        
        function updatePlayersList() {
            playersList.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-card';
                div.style.padding = '10px';
                div.style.margin = '5px 0';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="color: #ffd700;">${p.name}</span>
                        <span style="color: #7fffd4;">⭐ ${p.rating}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span class="player-color ${p.color === 'white' ? 'white-color' : 'black-color'}">
                            ${p.color === 'white' ? '⚪' : '⚫'} ${p.color}
                        </span>
                        <span>${p.ready ? '✅ Готов' : '⏳ Ждём'}</span>
                    </div>
                `;
                playersList.appendChild(div);
            });
        }
        
        function updatePlayerColor() {
            if (playerColor === 'white') {
                playerColorSpan.className = 'player-color white-color';
                playerColorSpan.textContent = '⚪ Белые';
            } else if (playerColor === 'black') {
                playerColorSpan.className = 'player-color black-color';
                playerColorSpan.textContent = '⚫ Чёрные';
            }
        }
        
        function addChatMessage(sender, message, time = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            msgDiv.innerHTML = `
                <span class="chat-sender">${sender}:</span>
                <span>${message}</span>
                <span class="chat-time">${time || new Date().toLocaleTimeString()}</span>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        createRoomBtn.onclick = () => {
            socket.send(JSON.stringify({ type: 'create_room' }));
        };
        
        joinRoomBtn.onclick = () => {
            if (roomInput.value) {
                socket.send(JSON.stringify({
                    type: 'join_room',
                    roomId: roomInput.value
                }));
            }
        };
        
        readyBtn.onclick = () => {
            socket.send(JSON.stringify({ type: 'ready' }));
            readyBtn.disabled = true;
            readyBtn.textContent = '✅ Ожидание...';
        };
        
        resignBtn.onclick = () => {
            if (confirm('🏳️ Точно сдаёшься?')) {
                socket.send(JSON.stringify({ type: 'resign' }));
            }
        };
        
        drawBtn.onclick = () => {
            socket.send(JSON.stringify({ type: 'offer_draw' }));
            addChatMessage('Система', '🤝 Ты предложил ничью');
        };
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value) {
                socket.send(JSON.stringify({
                    type: 'chat',
                    message: chatInput.value
                }));
                chatInput.value = '';
            }
        });
        
        modalCloseBtn.onclick = () => {
            modal.classList.add('hidden');
        };
        
        // Начальная отрисовка пустой доски
        for (let y = 0; y < 8; y++) {
            board[y] = [];
            for (let x = 0; x < 8; x++) {
                board[y][x] = '';
            }
        }
        renderBoard();
    </script>
</body>
    </html>
